<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DM Barber Studio — Reserva tu cita</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0A1628; }
    .grid-auto { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (max-width: 600px) {
      .grid-auto { grid-template-columns: 1fr; }
      .two-col { grid-template-columns: 1fr; }
      .grid-2 { grid-template-columns: repeat(2, 1fr); }
      .hide-mobile { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const C = {
      bg: "#0A1628",
      bgSoft: "#0D1E38",
      bgMid: "#112244",
      card: "#0F2040",
      cardHover: "#142850",
      cyan: "#00C8DC",
      cyanLight: "#00C8DC20",
      cyanDark: "#00A0B8",
      yellow: "#E8C840",
      yellowLight: "#E8C84020",
      yellowDark: "#C4A820",
      text: "#F0F4FF",
      textSoft: "#9AAED0",
      muted: "#5A7A9A",
      border: "#1A3050",
      borderLight: "#243C60",
      success: "#00C8A0",
      successLight: "#00C8A020",
      warning: "#E8C840",
      warningLight: "#E8C84020",
      danger: "#E84060",
      dangerLight: "#E8406020",
    };

    const FONT = "'Inter', 'Segoe UI', system-ui, sans-serif";
    const SERIF = "'Cormorant Garamond', Georgia, serif";

    const SERVICES = [
      { id:1, name:"Corte Caballero",     duration:30, price:15, desc:"Corte clásico o moderno adaptado a tu estilo" },
      { id:2, name:"Recorte de Barba",    duration:30, price:10, desc:"Perfilado y definición profesional de barba" },
      { id:3, name:"Corte + Barba",       duration:60, price:20, desc:"El pack completo — corte y arreglo de barba" },
      { id:4, name:"Rasurado de Cabeza",  duration:30, price:15, desc:"Cabeza al cero con máquina o cuchilla" },
      { id:5, name:"Corte Junior",        duration:30, price:13, desc:"Corte cómodo y rápido para los más pequeños" },
      { id:6, name:"Corte a Domicilio",   duration:60, price:30, desc:"Te visito donde estés — servicio a domicilio" },
    ];

    const ALL_SLOTS = ["10:00","10:30","11:00","11:30","12:00","12:30","16:00","16:30","17:00","17:30","18:00","18:30","19:00","19:30","20:00"];
    const TODAY = new Date().toISOString().split("T")[0];
    const MAKE_URL = "TU_MAKE_WEBHOOK_URL";

    const fmtDate = (d) => new Date(d+"T12:00:00").toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});
    const cap = (s) => s.charAt(0).toUpperCase()+s.slice(1);
    const statusStyle = (s) => ({
      color: s==="confirmada"?C.success:s==="cancelada"?C.danger:C.warning,
      background: s==="confirmada"?C.successLight:s==="cancelada"?C.dangerLight:C.warningLight,
    });

    function App() {
      const [view, setView] = useState("home");
      const [step, setStep] = useState(1);
      const [service, setService] = useState(null);
      const [date, setDate] = useState("");
      const [time, setTime] = useState("");
      const [form, setForm] = useState({name:"",phone:"",email:"",notes:""});
      const [appts, setAppts] = useState(() => {
        try { return JSON.parse(localStorage.getItem("dm_appts")||"[]"); } catch { return []; }
      });
      const [adminAuth, setAdminAuth] = useState(false);
      const [adminPass, setAdminPass] = useState("");
      const [adminErr, setAdminErr] = useState("");
      const [filter, setFilter] = useState("hoy");
      const [calMonth, setCalMonth] = useState(() => { const d=new Date(); return new Date(d.getFullYear(),d.getMonth(),1); });
      const [misCitasSearch, setMisCitasSearch] = useState("");
      const [misCitasQuery, setMisCitasQuery] = useState("");
      const [localIds, setLocalIds] = useState(() => {
        try { return JSON.parse(localStorage.getItem("dm_my_ids")||"[]"); } catch { return []; }
      });
      const [isMobile, setIsMobile] = useState(window.innerWidth<=600);

      useEffect(() => {
        const h = () => setIsMobile(window.innerWidth<=600);
        window.addEventListener("resize",h); return () => window.removeEventListener("resize",h);
      },[]);

      const save = (a) => { setAppts(a); try{localStorage.setItem("dm_appts",JSON.stringify(a));}catch{}; };
      const saveId = (id) => { const u=[...localIds,id]; setLocalIds(u); try{localStorage.setItem("dm_my_ids",JSON.stringify(u));}catch{}; };
      const slotTaken = (d,t) => appts.some(a=>a.date===d&&a.time===t&&a.status!=="cancelada");
      const updateStatus = (id,status) => save(appts.map(a=>a.id===id?{...a,status}:a));
      const cancelMiCita = (id) => updateStatus(id,"cancelada");
      const tryLogin = () => { if(adminPass==="dm2024"){setAdminAuth(true);setAdminErr("");}else setAdminErr("Contraseña incorrecta."); };
      const goHome = () => { setView("home");setStep(1);setService(null);setDate("");setTime("");setForm({name:"",phone:"",email:"",notes:""}); };

      const submitBooking = () => {
        const a = {id:Date.now(),...form,service:service.name,date,time,status:"confirmada"};
        save([...appts,a]);
        saveId(a.id);
        if(form.email&&MAKE_URL!=="TU_MAKE_WEBHOOK_URL"){
          fetch(MAKE_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(a)}).catch(()=>{});
        }
        setStep(4);
      };

      const downloadICS = () => {
        if(!service||!date||!time)return;
        const [y,m,d]=date.split("-").map(Number);
        const [h,min]=time.split(":").map(Number);
        const pad=n=>String(n).padStart(2,"0");
        const s=`${y}${pad(m)}${pad(d)}T${pad(h)}${pad(min)}00`;
        const em=h*60+min+service.duration, eh=Math.floor(em/60), emn=em%60;
        const e=`${y}${pad(m)}${pad(d)}T${pad(eh)}${pad(emn)}00`;
        const ics=["BEGIN:VCALENDAR","VERSION:2.0","BEGIN:VEVENT",`DTSTART:${s}`,`DTEND:${e}`,
          `SUMMARY:${service.name} — DM Barber Studio`,
          "LOCATION:Carrer el cami 93\\, Alcoy","STATUS:CONFIRMED","END:VEVENT","END:VCALENDAR"].join("\r\n");
        const url=URL.createObjectURL(new Blob([ics],{type:"text/calendar"}));
        const link=document.createElement("a"); link.href=url; link.download="cita-dm-barber.ics"; link.click();
        URL.revokeObjectURL(url);
      };

      const getFiltered = () => {
        let base = filter==="hoy" ? appts.filter(a=>a.date===TODAY) :
                   filter==="manana" ? (()=>{const t=new Date();t.setDate(t.getDate()+1);return appts.filter(a=>a.date===t.toISOString().split("T")[0]);})() :
                   [...appts];
        return base.sort((a,b)=>a.date===b.date?a.time.localeCompare(b.time):a.date.localeCompare(b.date));
      };

      const buildCal = () => {
        const year=calMonth.getFullYear(), month=calMonth.getMonth();
        const daysInMonth=new Date(year,month+1,0).getDate();
        const firstDay=(new Date(year,month,1).getDay()+6)%7;
        const todayObj=new Date();
        const monthNames=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
        const ds=(day)=>`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
        const isPast=(day)=>new Date(year,month,day)<new Date(todayObj.getFullYear(),todayObj.getMonth(),todayObj.getDate());
        const isSun=(day)=>new Date(year,month,day).getDay()===0;
        const taken=(day)=>ALL_SLOTS.filter(t=>slotTaken(ds(day),t)).length;
        return {year,month,daysInMonth,firstDay,monthNames,ds,isPast,isSun,taken};
      };

      const inp = {width:"100%",padding:"12px 14px",border:`1px solid ${C.border}`,borderRadius:8,fontSize:16,background:C.bgSoft,color:C.text,boxSizing:"border-box",outline:"none",fontFamily:FONT};
      const primaryBtn = {padding:"12px 28px",borderRadius:6,border:"none",cursor:"pointer",fontSize:14,fontWeight:600,fontFamily:FONT,background:`linear-gradient(135deg,${C.cyan},${C.cyanDark})`,color:C.bg};
      const yellowBtn = {padding:"12px 28px",borderRadius:6,border:"none",cursor:"pointer",fontSize:14,fontWeight:600,fontFamily:FONT,background:`linear-gradient(135deg,${C.yellow},${C.yellowDark})`,color:C.bg};
      const outlineBtn = {padding:"12px 28px",borderRadius:6,border:`1.5px solid ${C.cyan}`,cursor:"pointer",fontSize:14,fontWeight:600,fontFamily:FONT,background:"transparent",color:C.cyan};
      const ghostBtn = {background:"none",border:"none",cursor:"pointer",color:C.muted,fontSize:13,padding:0,fontFamily:FONT};

      // Logo component
      const Logo = ({size=1}) => (
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{position:"relative",width:44*size,height:44*size}}>
            <div style={{fontFamily:SERIF,fontSize:36*size,fontWeight:700,color:C.text,lineHeight:1,letterSpacing:"-0.02em",position:"relative",zIndex:2}}>DM</div>
            <div style={{position:"absolute",bottom:4*size,left:-2*size,right:-2*size,height:12*size,background:`linear-gradient(90deg,${C.cyan},${C.yellow})`,opacity:0.35,borderRadius:2,zIndex:1}}/>
          </div>
          <div>
            <div style={{fontSize:11*size,fontWeight:600,color:C.textSoft,letterSpacing:"0.18em",textTransform:"uppercase"}}>Barber Studio</div>
            {size>=1&&<div style={{fontSize:9,color:C.muted,letterSpacing:"0.1em",textTransform:"uppercase"}}>Alcoy</div>}
          </div>
        </div>
      );

      // ── HOME ──────────────────────────────────────────────────────
      if(view==="home") return (
        <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT,color:C.text}}>
          {/* Header */}
          <div style={{background:C.bgSoft,borderBottom:`1px solid ${C.border}`,padding:`0 ${isMobile?"16px":"32px"}`}}>
            <div style={{maxWidth:1000,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:62,gap:8}}>
              <Logo size={isMobile?0.85:1}/>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setView("admin")} style={{...ghostBtn,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 12px",fontSize:12,color:C.muted}}>Admin</button>
                <button onClick={()=>setView("miscitas")} style={{...ghostBtn,border:`1px solid ${C.border}`,borderRadius:6,padding:"7px 12px",fontSize:12,color:C.muted}}>Mis citas</button>
                <button onClick={()=>setView("booking")} style={{...primaryBtn,padding:"9px 16px",fontSize:13}}>Reservar 💈</button>
              </div>
            </div>
          </div>

          {/* Hero */}
          <div style={{
            background:`linear-gradient(160deg, ${C.bgMid} 0%, ${C.bg} 100%)`,
            padding:isMobile?"48px 16px":"80px 32px",
            textAlign:"center",
            borderBottom:`1px solid ${C.border}`,
            position:"relative",
            overflow:"hidden"
          }}>
            {/* Glow effects */}
            <div style={{position:"absolute",top:-100,left:"20%",width:400,height:400,background:C.cyanLight,borderRadius:"50%",filter:"blur(80px)",pointerEvents:"none"}}/>
            <div style={{position:"absolute",bottom:-80,right:"15%",width:300,height:300,background:C.yellowLight,borderRadius:"50%",filter:"blur(80px)",pointerEvents:"none"}}/>

            <div style={{position:"relative"}}>
              {/* Logo grande */}
              <div style={{marginBottom:24,display:"inline-block"}}>
                <div style={{position:"relative",display:"inline-block"}}>
                  <div style={{fontFamily:SERIF,fontSize:isMobile?72:110,fontWeight:700,color:C.text,lineHeight:0.9,letterSpacing:"-0.02em"}}>DM</div>
                  <div style={{
                    position:"absolute",
                    bottom:isMobile?12:18,
                    left:-4,right:-4,
                    height:isMobile?18:26,
                    background:`linear-gradient(90deg,${C.cyan},${C.yellow})`,
                    opacity:0.35,
                    borderRadius:3
                  }}/>
                </div>
                <div style={{
                  display:"inline-block",
                  background:`linear-gradient(90deg,${C.cyan}20,${C.yellow}20)`,
                  border:`1px solid ${C.border}`,
                  borderRadius:4,
                  padding:"4px 16px",
                  marginTop:4
                }}>
                  <span style={{fontFamily:SERIF,fontSize:isMobile?18:22,fontWeight:600,letterSpacing:"0.2em",color:C.textSoft,textTransform:"uppercase"}}>Barber Studio</span>
                </div>
              </div>

              <p style={{fontSize:isMobile?13:15,color:C.textSoft,margin:"0 auto 28px",maxWidth:400,lineHeight:1.9}}>
                Cortes y barba profesional en Alcoy.<br/>
                <span style={{color:C.cyan}}>Reserva en segundos</span> — sin Booksy, sin comisiones.
              </p>
              <button onClick={()=>setView("booking")} style={{...primaryBtn,fontSize:15,padding:"14px 40px"}}>
                Reservar cita
              </button>
            </div>
          </div>

          {/* Servicios */}
          <div style={{maxWidth:1000,margin:"0 auto",padding:isMobile?"28px 16px":"48px 32px"}}>
            <div style={{textAlign:"center",marginBottom:28}}>
              <div style={{fontFamily:SERIF,fontSize:isMobile?28:38,fontWeight:600,color:C.text,marginBottom:6}}>Servicios</div>
              <div style={{fontSize:13,color:C.muted}}>Toca el servicio para reservar directamente</div>
            </div>
            <div className="grid-auto">
              {SERVICES.map(s=>(
                <div key={s.id} onClick={()=>{setService(s);setStep(2);setView("booking");}}
                  style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"18px 20px",cursor:"pointer",transition:"all 0.18s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=C.cyan;e.currentTarget.style.background=C.cardHover;e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow=`0 8px 24px ${C.cyanLight}`;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.background=C.card;e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
                  <div style={{fontWeight:600,fontSize:15,color:C.text,marginBottom:5}}>{s.name}</div>
                  <div style={{fontSize:12,color:C.muted,marginBottom:14,lineHeight:1.6}}>{s.desc}</div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:11,color:C.muted,background:C.bgSoft,padding:"3px 10px",borderRadius:20,border:`1px solid ${C.border}`}}>{s.duration} min</span>
                    <span style={{fontFamily:SERIF,fontSize:22,fontWeight:600,background:`linear-gradient(135deg,${C.cyan},${C.yellow})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>{s.price}€</span>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Footer */}
          <div style={{background:C.bgSoft,borderTop:`1px solid ${C.border}`,padding:"24px",textAlign:"center"}}>
            <Logo size={0.85}/>
            <div style={{fontSize:12,color:C.muted,marginTop:8}}>Carrer el cami 93 · Alcoy · @dm.barberstudio</div>
          </div>
        </div>
      );

      // ── BOOKING ───────────────────────────────────────────────────
      if(view==="booking") return (
        <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT,color:C.text}}>
          <div style={{background:C.bgSoft,borderBottom:`1px solid ${C.border}`,padding:"0 16px"}}>
            <div style={{maxWidth:680,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
              <button onClick={()=>{if(step===1||step===4)goHome();else setStep(s=>s-1);}} style={ghostBtn}>← {step===1||step===4?"Inicio":"Atrás"}</button>
              <div style={{fontFamily:SERIF,fontSize:18,fontWeight:600,color:C.cyan}}>
                {step===1?"Elige servicio":step===2?"Fecha y hora":step===3?"Tus datos":"¡Reservado!"}
              </div>
              <div style={{fontSize:12,color:C.muted}}>{step<4?`${step}/3`:""}</div>
            </div>
          </div>
          {step<4&&<div style={{height:3,background:C.border}}>
            <div style={{height:"100%",background:`linear-gradient(90deg,${C.cyan},${C.yellow})`,width:`${(step/3)*100}%`,transition:"width 0.3s"}}/>
          </div>}

          <div style={{maxWidth:680,margin:"0 auto",padding:isMobile?"20px 16px":"36px 24px"}}>

            {/* STEP 1 */}
            {step===1&&(
              <>
                <h2 style={{fontFamily:SERIF,fontSize:28,fontWeight:600,color:C.text,margin:"0 0 6px"}}>¿Qué necesitas?</h2>
                <p style={{fontSize:13,color:C.muted,margin:"0 0 22px"}}>Selecciona el servicio</p>
                <div className="grid-auto" style={{gap:10}}>
                  {SERVICES.map(s=>(
                    <div key={s.id} onClick={()=>{setService(s);setStep(2);}}
                      style={{background:service?.id===s.id?C.cyanLight:C.card,border:`1.5px solid ${service?.id===s.id?C.cyan:C.border}`,borderRadius:8,padding:"14px 16px",cursor:"pointer",transition:"border-color 0.15s"}}>
                      <div style={{fontWeight:600,fontSize:14,color:C.text,marginBottom:4}}>{s.name}</div>
                      <div style={{fontSize:11,color:C.muted,marginBottom:10,lineHeight:1.5}}>{s.desc}</div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <span style={{fontSize:11,color:C.muted}}>{s.duration} min</span>
                        <span style={{fontFamily:SERIF,fontSize:18,fontWeight:600,color:C.cyan}}>{s.price}€</span>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}

            {/* STEP 2 */}
            {step===2&&(()=>{
              const {year,month,daysInMonth,firstDay,monthNames,ds,isPast,isSun,taken}=buildCal();
              const dayNames=["L","M","X","J","V","S","D"];
              const morn=ALL_SLOTS.filter(t=>t<"14:00");
              const aftn=ALL_SLOTS.filter(t=>t>="14:00");
              return(
                <>
                  <h2 style={{fontFamily:SERIF,fontSize:28,fontWeight:600,color:C.text,margin:"0 0 6px"}}>Elige fecha y hora</h2>
                  <div style={{background:C.cyanLight,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 14px",marginBottom:20,display:"flex",justifyContent:"space-between",fontSize:13}}>
                    <span style={{color:C.cyan,fontWeight:600}}>{service?.name}</span>
                    <span style={{color:C.muted}}>{service?.duration} min · {service?.price}€</span>
                  </div>

                  <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,overflow:"hidden",marginBottom:20}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",borderBottom:`1px solid ${C.border}`,background:C.bgSoft}}>
                      <button onClick={()=>{setCalMonth(new Date(year,month-1,1));setDate("");setTime("");}} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 14px",color:C.cyan,cursor:"pointer",fontSize:15,fontFamily:FONT}}>‹</button>
                      <div style={{fontFamily:SERIF,fontSize:17,fontWeight:600,color:C.text}}>{monthNames[month]} {year}</div>
                      <button onClick={()=>{setCalMonth(new Date(year,month+1,1));setDate("");setTime("");}} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"5px 14px",color:C.cyan,cursor:"pointer",fontSize:15,fontFamily:FONT}}>›</button>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"10px 8px 2px"}}>
                      {dayNames.map((d,i)=><div key={d} style={{textAlign:"center",fontSize:11,color:i===6?C.danger:C.muted,padding:"4px 0",letterSpacing:"0.06em"}}>{d}</div>)}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,padding:"4px 8px 14px"}}>
                      {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
                      {Array.from({length:daysInMonth}).map((_,i)=>{
                        const day=i+1, d=ds(day);
                        const past=isPast(day), sun=isSun(day);
                        const t=taken(day), full=t>=ALL_SLOTS.length;
                        const disabled=past||sun||full, sel=date===d, partial=t>0&&!full;
                        let bg="transparent",bc=C.borderLight,tc=C.textSoft;
                        if(sel){bg=C.cyan;bc=C.cyan;tc:C.bg;}
                        else if(past||sun){bc="transparent";tc=C.border;}
                        else if(full){bg:C.dangerLight;bc:`${C.danger}30`;tc=C.danger;}
                        else if(partial){bc=`${C.yellow}40`;tc=C.yellow;}
                        return(
                          <button key={day} disabled={disabled} onClick={()=>{setDate(d);setTime("");}}
                            style={{aspectRatio:"1",borderRadius:8,border:`1px solid ${bc}`,background:sel?C.cyan:bg,color:sel?C.bg:tc,fontSize:13,cursor:disabled?"default":"pointer",fontFamily:FONT,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1,transition:"all 0.12s"}}>
                            <span>{day}</span>
                            {!past&&!sun&&partial&&!sel&&<span style={{fontSize:6,color:C.yellow}}>●</span>}
                          </button>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",gap:14,padding:"8px 14px 12px",borderTop:`1px solid ${C.border}`,flexWrap:"wrap"}}>
                      {[{bg:"transparent",bc:C.borderLight,label:"Disponible"},{bg:"transparent",bc:`${C.yellow}40`,label:"Parcial"},{bg:C.dangerLight,bc:`${C.danger}30`,label:"Completo"}].map(l=>(
                        <div key={l.label} style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:C.muted}}>
                          <div style={{width:12,height:12,borderRadius:3,background:l.bg,border:`1px solid ${l.bc}`}}/>{l.label}
                        </div>
                      ))}
                    </div>
                  </div>

                  {date&&(
                    <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 18px",marginBottom:18}}>
                      <div style={{fontFamily:SERIF,fontSize:16,fontWeight:600,color:C.text,marginBottom:14}}>{cap(fmtDate(date))}</div>
                      {[["Mañana",morn],["Tarde",aftn]].map(([label,slots])=>(
                        <div key={label} style={{marginBottom:12}}>
                          <div style={{fontSize:10,color:C.muted,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.1em"}}>{label}</div>
                          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                            {slots.map(t=>{
                              const tak=slotTaken(date,t), sel=time===t;
                              return(
                                <button key={t} disabled={tak} onClick={()=>setTime(t)}
                                  style={{padding:"9px 14px",borderRadius:6,fontSize:13,fontFamily:FONT,cursor:tak?"default":"pointer",
                                    border:sel?`1px solid ${C.cyan}`:tak?"1px solid #E8406030":"1px solid #00C8A040",
                                    background:sel?C.cyan:tak?"#E8406015":"#00C8A015",
                                    color:sel?C.bg:tak?C.danger:C.success,fontWeight:sel?700:400}}>
                                  {t} {tak?"✗":"✓"}
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                  {time&&<div style={{textAlign:"right"}}><button onClick={()=>setStep(3)} style={primaryBtn}>Continuar →</button></div>}
                </>
              );
            })()}

            {/* STEP 3 */}
            {step===3&&(
              <>
                <h2 style={{fontFamily:SERIF,fontSize:28,fontWeight:600,color:C.text,margin:"0 0 6px"}}>Tus datos</h2>
                <p style={{fontSize:13,color:C.muted,margin:"0 0 20px"}}>Para confirmar tu reserva</p>
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"12px 16px",marginBottom:20,fontSize:13}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                    <span style={{fontWeight:600,color:C.text}}>{service?.name}</span>
                    <span style={{fontFamily:SERIF,fontSize:18,fontWeight:600,color:C.cyan}}>{service?.price}€</span>
                  </div>
                  <div style={{color:C.muted}}>{cap(fmtDate(date))} · {time}h</div>
                </div>
                <div style={{display:"grid",gap:14}}>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:C.textSoft,display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>Nombre completo *</label>
                    <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Ej: Carlos García" style={inp}/>
                  </div>
                  <div className="two-col">
                    <div>
                      <label style={{fontSize:11,fontWeight:600,color:C.textSoft,display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>Teléfono *</label>
                      <input value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="612 345 678" style={inp}/>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:600,color:C.textSoft,display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>Email *</label>
                      <input value={form.email} onChange={e=>setForm(f=>({...f,email:e.target.value}))} placeholder="correo@email.com" style={inp}/>
                    </div>
                  </div>
                  <div>
                    <label style={{fontSize:11,fontWeight:600,color:C.textSoft,display:"block",marginBottom:7,textTransform:"uppercase",letterSpacing:"0.07em"}}>Notas (opcional)</label>
                    <textarea value={form.notes} onChange={e=>setForm(f=>({...f,notes:e.target.value}))} placeholder="Tipo de corte, longitud, preferencias..." rows={3} style={{...inp,resize:"vertical"}}/>
                  </div>
                </div>
                <div style={{marginTop:22,textAlign:"right"}}>
                  <button onClick={submitBooking} disabled={!form.name||!form.phone||!form.email}
                    style={{...primaryBtn,opacity:!form.name||!form.phone||!form.email?0.4:1,cursor:!form.name||!form.phone||!form.email?"default":"pointer"}}>
                    Confirmar reserva 💈
                  </button>
                </div>
              </>
            )}

            {/* STEP 4 */}
            {step===4&&(
              <div style={{textAlign:"center",padding:"20px 0 40px"}}>
                <div style={{width:72,height:72,borderRadius:"50%",background:`linear-gradient(135deg,${C.cyan},${C.yellow})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,margin:"0 auto 20px"}}>💈</div>
                <h2 style={{fontFamily:SERIF,fontSize:34,fontWeight:600,color:C.text,margin:"0 0 10px"}}>¡Reserva confirmada!</h2>
                <p style={{fontSize:14,color:C.muted,margin:"0 auto 26px",maxWidth:380,lineHeight:1.8}}>
                  Te esperamos en DM Barber Studio, Alcoy.<br/>Si necesitas cancelar, hazlo con antelación.
                </p>
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:10,padding:"20px",maxWidth:360,margin:"0 auto 24px",textAlign:"left"}}>
                  <div style={{fontSize:10,color:C.muted,marginBottom:12,textTransform:"uppercase",letterSpacing:"0.1em"}}>Tu reserva</div>
                  {[["Servicio",service?.name],["Fecha",cap(fmtDate(date))],["Hora",`${time}h`],["Nombre",form.name],["Teléfono",form.phone]].map(([k,v])=>(
                    <div key={k} style={{display:"flex",justifyContent:"space-between",fontSize:13,padding:"6px 0",borderBottom:`1px solid ${C.border}`}}>
                      <span style={{color:C.muted}}>{k}</span><span style={{color:C.text,fontWeight:500}}>{v}</span>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
                  <button onClick={downloadICS} style={{...yellowBtn,display:"flex",alignItems:"center",gap:8,width:"100%",maxWidth:260,justifyContent:"center"}}>
                    📅 Añadir al calendario
                  </button>
                  <button onClick={goHome} style={{...outlineBtn,width:"100%",maxWidth:260,textAlign:"center"}}>Volver al inicio</button>
                </div>
              </div>
            )}
          </div>
        </div>
      );

      // ── MIS CITAS ─────────────────────────────────────────────────
      if(view==="miscitas") return(
        <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT,color:C.text}}>
          <div style={{background:C.bgSoft,borderBottom:`1px solid ${C.border}`,padding:"0 16px"}}>
            <div style={{maxWidth:680,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:56}}>
              <button onClick={()=>setView("home")} style={ghostBtn}>← Inicio</button>
              <div style={{fontFamily:SERIF,fontSize:18,fontWeight:600,color:C.cyan}}>Mis citas</div>
              <div style={{width:50}}/>
            </div>
          </div>
          <div style={{maxWidth:680,margin:"0 auto",padding:isMobile?"20px 16px":"36px 24px"}}>
            <p style={{fontSize:13,color:C.muted,margin:"0 0 20px"}}>Introduce tu email o teléfono para ver tus reservas</p>
            <div style={{display:"flex",gap:10,marginBottom:24}}>
              <input value={misCitasSearch} onChange={e=>setMisCitasSearch(e.target.value)} placeholder="Email o teléfono..." style={{...inp,flex:1}}/>
              <button onClick={()=>setMisCitasQuery(misCitasSearch)} style={{...primaryBtn,padding:"11px 18px",whiteSpace:"nowrap"}}>Buscar</button>
            </div>
            {misCitasQuery&&(()=>{
              const mine=appts.filter(a=>
                (a.email&&a.email.toLowerCase()===misCitasQuery.toLowerCase())||
                (a.phone&&a.phone.replace(/\s/g,"")===misCitasQuery.replace(/\s/g,""))
              ).sort((a,b)=>a.date===b.date?a.time.localeCompare(b.time):a.date.localeCompare(b.date));
              if(mine.length===0)return<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"36px",textAlign:"center",color:C.muted}}>No hay citas con ese email o teléfono.</div>;
              return(
                <div style={{display:"grid",gap:10}}>
                  {mine.map(a=>{
                    const past=new Date(a.date+"T23:59:00")<new Date(), canc=a.status==="cancelada";
                    return(
                      <div key={a.id} style={{background:C.card,border:`1.5px solid ${canc?`${C.danger}30`:past?C.border:C.borderLight}`,borderRadius:10,padding:"16px 18px",opacity:canc||past?0.65:1}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
                          <div>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                              <span style={{fontFamily:SERIF,fontSize:16,fontWeight:600,color:C.text}}>{a.service}</span>
                              <span style={{fontSize:11,fontWeight:600,padding:"2px 10px",borderRadius:20,...statusStyle(a.status)}}>{cap(a.status)}</span>
                            </div>
                            <div style={{fontSize:13,color:C.muted}}>📅 {cap(fmtDate(a.date))} · 🕐 {a.time}h</div>
                          </div>
                          {!canc&&!past&&localIds.includes(a.id)&&(
                            <button onClick={()=>{if(window.confirm("¿Cancelar esta cita?"))cancelMiCita(a.id);}}
                              style={{padding:"7px 14px",borderRadius:6,border:`1px solid ${C.danger}`,background:C.dangerLight,color:C.danger,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>
                              ❌ Cancelar
                            </button>
                          )}
                          {!canc&&!past&&!localIds.includes(a.id)&&(
                            <span style={{fontSize:11,color:C.muted,fontStyle:"italic"}}>Solo desde el dispositivo original</span>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        </div>
      );

      // ── ADMIN ─────────────────────────────────────────────────────
      if(view==="admin") return(
        <div style={{background:C.bg,minHeight:"100vh",fontFamily:FONT,color:C.text}}>
          <div style={{background:C.bgSoft,borderBottom:`1px solid ${C.border}`,padding:"0 16px"}}>
            <div style={{maxWidth:1000,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",height:54}}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <button onClick={()=>setView("home")} style={ghostBtn}>← Inicio</button>
                <span style={{color:C.border}}>|</span>
                <div style={{fontFamily:SERIF,fontSize:17,fontWeight:600,color:C.cyan}}>Panel Admin</div>
              </div>
              {adminAuth&&<button onClick={()=>{setAdminAuth(false);setAdminPass("");}} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:6,padding:"6px 14px",fontSize:12,color:C.muted,cursor:"pointer",fontFamily:FONT}}>Salir</button>}
            </div>
          </div>

          <div style={{maxWidth:1000,margin:"0 auto",padding:isMobile?"20px 16px":"32px 24px"}}>
            {!adminAuth&&(
              <div style={{maxWidth:380,margin:"0 auto"}}>
                <div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:12,padding:"36px 32px"}}>
                  <div style={{textAlign:"center",marginBottom:24}}>
                    <Logo size={1}/>
                    <p style={{fontSize:13,color:C.muted,marginTop:12}}>Acceso privado — solo para el equipo</p>
                  </div>
                  <label style={{fontSize:11,fontWeight:600,color:C.textSoft,display:"block",marginBottom:8,textTransform:"uppercase",letterSpacing:"0.07em"}}>Contraseña</label>
                  <input type="password" value={adminPass} onChange={e=>setAdminPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryLogin()} placeholder="••••••••" style={{...inp,marginBottom:12}}/>
                  {adminErr&&<div style={{fontSize:12,color:C.danger,marginBottom:10}}>{adminErr}</div>}
                  <button onClick={tryLogin} style={{...primaryBtn,width:"100%",textAlign:"center"}}>Entrar</button>
                  <div style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:12}}>Demo: dm2024</div>
                </div>
              </div>
            )}

            {adminAuth&&(
              <>
                <div className="grid-2" style={{gap:12,marginBottom:24}}>
                  {[
                    {label:"Citas hoy",value:appts.filter(a=>a.date===TODAY).length,color:C.cyan,bg:C.cyanLight},
                    {label:"Próximas",value:appts.filter(a=>a.status==="confirmada"&&a.date>=TODAY).length,color:C.yellow,bg:C.yellowLight},
                    {label:"Canceladas",value:appts.filter(a=>a.status==="cancelada").length,color:C.danger,bg:C.dangerLight},
                    {label:"Total",value:appts.length,color:C.muted,bg:C.bgSoft},
                  ].map((k,i)=>(
                    <div key={i} style={{background:k.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"16px",textAlign:"center"}}>
                      <div style={{fontFamily:SERIF,fontSize:32,fontWeight:600,color:k.color,lineHeight:1}}>{k.value}</div>
                      <div style={{fontSize:11,color:C.muted,marginTop:4}}>{k.label}</div>
                    </div>
                  ))}
                </div>

                <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap"}}>
                  {[["hoy","Hoy"],["manana","Mañana"],["todas","Todas"]].map(([k,label])=>(
                    <button key={k} onClick={()=>setFilter(k)}
                      style={{padding:"7px 16px",borderRadius:6,border:`1px solid ${filter===k?C.cyan:C.border}`,background:filter===k?C.cyanLight:C.card,color:filter===k?C.cyan:C.muted,fontSize:13,cursor:"pointer",fontFamily:FONT}}>
                      {label}
                    </button>
                  ))}
                </div>

                <div style={{display:"grid",gap:8}}>
                  {getFiltered().length===0&&<div style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"36px",textAlign:"center",color:C.muted}}>No hay citas para este período</div>}
                  {getFiltered().map(a=>(
                    <div key={a.id} style={{background:C.card,border:`1px solid ${C.border}`,borderRadius:8,padding:"14px 16px"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:10}}>
                        <div style={{flex:1,minWidth:200}}>
                          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4,flexWrap:"wrap"}}>
                            <span style={{fontWeight:600,fontSize:14,color:C.text}}>{a.name}</span>
                            <span style={{fontSize:11,fontWeight:600,padding:"2px 10px",borderRadius:20,...statusStyle(a.status)}}>{cap(a.status)}</span>
                            <span style={{fontSize:11,padding:"2px 10px",borderRadius:20,background:C.cyanLight,color:C.cyan}}>{a.service}</span>
                          </div>
                          <div style={{fontSize:13,color:C.muted,marginBottom:2}}>{cap(fmtDate(a.date))} · {a.time}h</div>
                          <div style={{fontSize:13,color:C.muted}}>{a.phone} · {a.email}</div>
                          {a.notes&&<div style={{fontSize:12,color:C.muted,marginTop:4,fontStyle:"italic",background:C.bgSoft,padding:"4px 10px",borderRadius:4}}>{a.notes}</div>}
                        </div>
                        <div style={{display:"flex",gap:6,flexShrink:0}}>
                          {a.status==="confirmada"&&<button onClick={()=>updateStatus(a.id,"cancelada")} style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${C.danger}`,background:C.dangerLight,color:C.danger,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>Cancelar</button>}
                          {a.status==="cancelada"&&<button onClick={()=>updateStatus(a.id,"confirmada")} style={{padding:"6px 12px",borderRadius:6,border:`1px solid ${C.border}`,background:C.bgSoft,color:C.muted,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:FONT}}>Reactivar</button>}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      );
      return null;
    }
    const root=ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
